backend:
  name: github
  repo: your-github-username/your-repo-name # Replace with your GitHub repository path (e.g. org/repo)
  branch: main
  base_url: https://bakenyi-heritage.vercel.app # Your production website URL
  auth_endpoint: api/auth # Serverless OAuth gateway route

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blogs"
    label: "Blogs"
    folder: "content/blogs"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Language", "Heritage", "Tradition", "Leadership", "History", "Announcements"]
      - { label: "Featured Image", name: "featured_image", widget: "image" }
      - { label: "Publish Date", name: "publish_date", widget: "date" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Featured Image", name: "featured_image", widget: "image" }
      - { label: "Date", name: "date", widget: "date" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Community News", "Culture", "Heritage", "Leadership", "History", "Announcements"]
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "vlogs"
    label: "Vlogs"
    folder: "content/vlogs"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Thumbnail Image", name: "thumbnail_image", widget: "image" }
      - { label: "YouTube URL", name: "youtube_url", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "publish_date", widget: "date" }

  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "gallery-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Images"
        name: "images"
        widget: "list"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string" }
